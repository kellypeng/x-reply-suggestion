<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>X (Twitter) Reply Helper</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        width: 340px;
        margin: 0;
        padding: 16px;
        font-size: 14px;
        color: #0f1419;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-weight: 600;
        margin: 10px 0 6px;
      }
      select,
      input[type="password"],
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border: 1px solid #cfd9de;
        border-radius: 8px;
        font-size: 13px;
        background: #fff;
      }
      .hint {
        font-size: 11px;
        color: #536471;
        margin-top: 4px;
      }
      .hint a { color: #1d9bf0; text-decoration: none; }
      button {
        margin-top: 14px;
        width: 100%;
        background: #1d9bf0;
        color: #fff;
        border: none;
        border-radius: 999px;
        padding: 9px 12px;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover { background: #1a8cd8; }
      #status {
        margin-top: 8px;
        font-size: 12px;
        min-height: 16px;
      }
      #status.ok { color: #00a86b; }
      #status.err { color: #c62828; }
      .row-foot {
        margin-top: 12px;
        font-size: 11px;
        color: #536471;
      }
      .credit {
        margin-top: 14px;
        padding-top: 10px;
        border-top: 1px solid #eef3f4;
        font-size: 11px;
        color: #536471;
        text-align: center;
      }
      .credit a {
        color: #1d9bf0;
        text-decoration: none;
      }
      .credit a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <h1>X (Twitter) Reply Helper</h1>

    <label for="provider">Provider</label>
    <select id="provider"></select>

    <label for="key">API Key</label>
    <input id="key" type="password" placeholder="..." autocomplete="off" />
    <div class="hint" id="keyHint"></div>

    <label for="modelSelect">Model</label>
    <select id="modelSelect"></select>
    <input id="modelCustom" type="text" placeholder="enter custom model name" autocomplete="off" hidden style="margin-top:6px;" />

    <button id="save">Save</button>
    <div id="status"></div>

    <p class="row-foot">
      Keys are stored locally in your browser only. Switch providers anytime —
      each key is remembered per provider.
    </p>
    <p class="credit">
      Made by
      <a href="https://x.com/kellyyuweipeng" target="_blank" rel="noopener">@kellyyuweipeng</a>
    </p>
    <script src="popup.js"></script>
  </body>
</html>
